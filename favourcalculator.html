<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favour Calculator</title>

    <link rel="stylesheet" href="favourcalculator.css">
</head>
<body>
    
    <div class="container">
        <div class="calculator-app">
            <div class="display-input-output">
                
            </div>

            <div class="input-keys" id="input-keys1">
                <input class="operators" type="button" value="C">
                <input class="operators" type="button" value="De">
                <input class="operators" type="button" value="^">
                <input class="operators" type="button" value="%">
            </div>

            <div class="input-keys" id="input-keys2">
                <input type="button" value="7">
                <input type="button" value="8">
                <input type="button" value="9">
                <input class="operators" type="button" value="*">
            </div>

            <div class="input-keys" id="input-keys3">
                <input type="button" value="4">
                <input type="button" value="5">
                <input type="button" value="6">
                <input class="operators" type="button" value="/">
            </div>

            <div class="input-keys" id="input-keys4">
                <input type="button" value="1">
                <input type="button" value="2">
                <input type="button" value="3">
                <input class="operators" type="button" value="+">
            </div>

            <div class="input-keys" id="input-keys5">
                <input type="button" value="0">
                <input class="operators" type="button" value=".">
                <input class="operators" type="button" value="-">
                <input class="operators" type="button" value="=">
            </div>
        </div>
    </div>

    <script src="favourcalculator.js"></script>
</body>
</html>
